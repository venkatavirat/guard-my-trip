<!DOCTYPE html>
<html>
<head>
    <title>Guard My Trip</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Guard My Trip</h1>

<div class="container">

    <h2>Safety Alerts</h2>
    <button onclick="showAlerts()">Check Alerts</button>
    <div id="alerts"></div>

    <h2>Risk Zones</h2>
    <button onclick="showZones()">View Zones</button>
    <div id="zones"></div>

    <h2>Emergency</h2>
    <button class="sos" onclick="sendSOS()">SOS</button>
    <div id="sos"></div>

</div>

<script src="script.js"></script>
</body>
</html>
